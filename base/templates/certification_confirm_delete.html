{% extends 'main.html' %}
{% block title %}Delete Certification{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <h3 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete</h3>
    </div>
    <div class="card-body">
        <p class="lead">Are you sure you want to delete the certification <strong>"{{ object.name }}"</strong>?</p>
        <p class="text-danger">This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="fas fa-trash me-1"></i>Yes, delete</button>
            <a href="{% url 'certification_list' %}" class="btn btn-secondary"><i class="fas fa-times me-1"></i>Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
